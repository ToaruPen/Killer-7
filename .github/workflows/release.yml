name: release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          need_pkgs=()
          command -v zip >/dev/null 2>&1 || need_pkgs+=(zip)
          command -v gh >/dev/null 2>&1 || need_pkgs+=(gh)
          if [ ${#need_pkgs[@]} -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${need_pkgs[@]}"
          fi

          tag="${GITHUB_REF_NAME}"
          mkdir -p dist

          cp "killer-7" "dist/killer-7"
          chmod +x "dist/killer-7"

          git archive --format=tar.gz --prefix="killer-7-${tag}/" -o "dist/killer-7-${tag}-source.tar.gz" HEAD
          git archive --format=zip --prefix="killer-7-${tag}/" -o "dist/killer-7-${tag}-source.zip" HEAD

          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"

          if gh release upload "$tag" dist/* --clobber --repo "$repo"; then
            exit 0
          fi

          if gh release create "$tag" dist/* --title "$tag" --generate-notes --repo "$repo"; then
            exit 0
          fi

          gh release upload "$tag" dist/* --clobber --repo "$repo"

  docker:
    runs-on: ubuntu-latest
    needs: release
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Resolve image tags
        id: image_tags
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${OWNER_LC}/killer-7"
          tag_ref="${GITHUB_REF_NAME}"
          tags="${image}:${tag_ref}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "$tag_ref" != *-* ]]; then
            tags+=$'\n'"${image}:latest"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
