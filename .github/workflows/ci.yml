name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements-killer7.txt

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-killer7.txt
          python -m pip install bandit

      - name: pip check
        run: |
          python -m pip check

      - name: Python compile check
        run: |
          python -m compileall -q killer_7 scripts tests

      - name: Ruff
        run: |
          ruff check killer_7 tests scripts
          ruff format --check killer_7 tests scripts

      - name: Shellcheck
        run: |
          shellcheck .githooks/pre-commit .githooks/pre-push scripts/*.sh scripts/tests/*.sh

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -p 'test*.py'

      - name: Script tests
        run: |
          for t in scripts/tests/test-*.sh; do
            bash "$t"
          done

      - name: Bandit
        run: |
          bandit -r killer_7 -ll
