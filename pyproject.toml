[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = [
  "E4",
  "E7",
  "E9",
  "F",
  "I",
  "S",
  "C4",
  "C901",
]

ignore = [
  "E501",
]

[tool.ruff.lint.mccabe]
max-complexity = 30

[tool.basedpyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"

reportAny = "warning"
reportExplicitAny = "warning"
reportUnusedCallResult = "warning"
